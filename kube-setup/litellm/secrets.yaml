# 1-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
type: Opaque
stringData:
  # Add your provider API keys here. LiteLLM will pick these up automatically.
  OPENAI_KEY: "API-KEY"
  ANTH_KEY: "AnthorpicKey"
  RBK_KEY: "RUBRIK-KEY" 
  RBK_WEBHOOK: "RUBRIK_WEBHOOK"
  LITELLM_MASTER_KEY: "sk_1234"


