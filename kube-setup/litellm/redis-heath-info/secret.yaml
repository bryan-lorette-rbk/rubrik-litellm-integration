# 1-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-your-openai-api-key"
  ANTHROPIC_API_KEY: "your-anthropic-key"
  
  # --- ADD REDIS CREDENTIALS ---
  REDIS_HOST: "your-redis-service.default.svc.cluster.local" # Or your external Redis host
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "your-secure-redis-password"